<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{EVENT_TITLE}} — 簽到表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a2e;
            --slate: #3a3a5c;
            --mist: #8888a8;
            --cloud: #e8e8f0;
            --snow: #f5f5fa;
            --paper: #ffffff;
            --accent: #2563eb;
            --accent-light: #60a5fa;
            --accent-glow: rgba(37, 99, 235, 0.06);
            --border: #d0d0e0;
            --row-alt: #f8f9fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4 portrait;
            margin: 12mm;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--snow);
            color: var(--ink);
            padding: 20px;
        }

        .sheet {
            max-width: 780px;
            margin: 0 auto;
            background: var(--paper);
            border-radius: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 12px 32px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            position: relative;
        }

        .sheet::before {
            content: '';
            display: block;
            height: 5px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light), #a78bfa, var(--accent));
        }

        .sheet+.sheet {
            margin-top: 24px;
        }

        .header {
            padding: 32px 36px 24px;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-mark {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-glow);
            border: 1px solid rgba(37, 99, 235, 0.12);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: 0.4px;
        }

        .event-title {
            font-size: 22px;
            font-weight: 900;
            line-height: 1.35;
            margin-bottom: 14px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--slate);
        }

        .meta-icon {
            width: 30px;
            height: 30px;
            background: var(--snow);
            border: 1px solid var(--cloud);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 13px;
        }

        .meta-label {
            font-size: 10px;
            color: var(--mist);
            font-weight: 500;
            letter-spacing: 0.6px;
        }

        .meta-value {
            font-weight: 500;
            color: var(--ink);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 36px;
        }

        .table-section {
            padding: 20px 36px 28px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--mist);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            font-size: 13px;
        }

        thead {
            background: linear-gradient(180deg, var(--ink) 0%, #252545 100%);
        }

        thead th {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.4px;
            padding: 11px 12px;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
        }

        thead th:last-child {
            border-right: none;
        }

        thead th.col-no {
            width: 36px;
        }

        thead th.col-name {
            width: 90px;
            text-align: left;
            padding-left: 14px;
        }

        thead th.col-email {
            width: auto;
        }

        thead th.col-phone {
            width: 120px;
        }

        thead th.col-sign {
            min-width: 90px;
            width: 100px;
        }

        tbody tr:nth-child(even) {
            background: var(--row-alt);
        }

        tbody td {
            padding: 10px 12px;
            border-top: 1px solid var(--cloud);
            border-right: 1px solid var(--cloud);
            text-align: center;
            color: var(--slate);
            vertical-align: middle;
        }

        tbody td:last-child {
            border-right: none;
        }

        tbody td:first-child {
            font-weight: 700;
            color: var(--mist);
            font-size: 12px;
        }

        tbody td.col-name {
            text-align: left;
            padding-left: 14px;
            color: var(--ink);
            font-weight: 500;
        }

        tbody td.col-email {
            font-size: 11.5px;
            color: #6b7280;
            font-family: 'SFMono-Regular', Consolas, monospace;
            text-align: left;
        }

        tbody td.col-phone {
            font-size: 12px;
            white-space: nowrap;
        }

        tbody td.sign-cell {
            min-width: 90px;
            position: relative;
            background: rgba(37, 99, 235, 0.015);
        }

        tbody td.sign-cell::after {
            content: '';
            position: absolute;
            bottom: 7px;
            left: 12px;
            right: 12px;
            border-bottom: 1px dashed var(--border);
        }

        .footer {
            padding: 16px 36px 22px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--cloud);
        }

        .footer-note {
            font-size: 11px;
            color: var(--mist);
            line-height: 1.7;
        }

        .footer-stamp {
            text-align: right;
        }

        .footer-stamp .label {
            font-size: 10px;
            color: var(--mist);
            letter-spacing: 0.4px;
            margin-bottom: 3px;
        }

        .stamp-line {
            width: 120px;
            border-bottom: 1.5px dashed var(--border);
            margin-top: 32px;
        }

        .page-info {
            font-size: 10px;
            color: var(--mist);
            text-align: center;
            padding: 6px 0 10px;
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .sheet {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }

            .sheet::before {
                height: 3px;
            }

            .sheet+.sheet {
                margin-top: 0;
                page-break-before: always;
            }

            .header {
                padding: 20px 28px 16px;
            }

            .table-section {
                padding: 14px 28px 20px;
            }

            .divider {
                margin: 0 28px;
            }

            .footer {
                padding: 12px 28px 16px;
            }

            .no-print {
                display: none !important;
            }
        }

        .print-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .print-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>

<body>

    {{PAGES}}

    <button class="print-btn no-print" onclick="window.print()">
        <i class="fa-solid fa-print"></i> 列印簽到表
    </button>
</body>

</html>
