<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{EVENT_TITLE}} — 簽到表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #000;
            --slate: #333;
            --mist: #666;
            --cloud: #eee;
            --snow: #fff;
            --paper: #fff;
            --accent: #000;
            --accent-light: #555;
            --accent-glow: transparent;
            --border: #ccc;
            --row-alt: #fafafa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4 portrait;
            margin: 12mm;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--snow);
            color: var(--ink);
            padding: 20px;
        }

        .sheet {
            max-width: 780px;
            margin: 0 auto;
            background: var(--paper);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .sheet+.sheet {
            margin-top: 24px;
        }

        .header {
            padding: 32px 36px 24px;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-mark {
            width: 38px;
            height: 38px;
            background: #000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border);
            color: var(--ink);
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .event-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 14px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--slate);
        }

        .meta-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            font-size: 14px;
        }

        .meta-label {
            font-size: 11px;
            color: var(--mist);
            font-weight: 500;
        }

        .meta-value {
            font-weight: 500;
            color: var(--ink);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 36px;
        }

        .table-section {
            padding: 20px 36px 28px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border);
            overflow: hidden;
            font-size: 13px;
        }

        thead {
            background: #eee;
        }

        thead th {
            color: #000;
            font-weight: 600;
            font-size: 13px;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        thead th:last-child {
            border-right: none;
        }

        thead th.col-no {
            width: 36px;
        }

        thead th.col-name {
            width: 90px;
            text-align: left;
            padding-left: 14px;
        }

        thead th.col-email {
            width: auto;
        }

        thead th.col-phone {
            width: 120px;
        }

        thead th.col-sign {
            min-width: 90px;
            width: 100px;
        }

        tbody tr:nth-child(even) {
            background: var(--row-alt);
        }

        tbody td {
            padding: 10px 12px;
            border: 1px solid var(--border);
            text-align: center;
            color: var(--slate);
            vertical-align: middle;
        }

        tbody td:first-child {
            font-weight: 700;
            color: var(--mist);
            font-size: 12px;
        }

        tbody td.col-name {
            text-align: left;
            padding-left: 14px;
            color: var(--ink);
            font-weight: 500;
        }

        tbody td.col-email {
            font-size: 11.5px;
            color: var(--mist);
            font-family: 'SFMono-Regular', Consolas, monospace;
            text-align: left;
        }

        tbody td.col-phone {
            font-size: 12px;
            white-space: nowrap;
        }

        tbody td.sign-cell {
            min-width: 90px;
            background: #fff;
        }

        .footer {
            padding: 16px 36px 22px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--border);
        }

        .footer-note {
            font-size: 11px;
            color: var(--mist);
            line-height: 1.7;
        }

        .footer-stamp {
            text-align: right;
        }

        .footer-stamp .label {
            font-size: 10px;
            color: var(--mist);
            letter-spacing: 0.4px;
            margin-bottom: 3px;
        }

        .stamp-line {
            width: 120px;
            border-bottom: 1.5px dashed var(--border);
            margin-top: 32px;
        }

        .page-info {
            font-size: 10px;
            color: var(--mist);
            text-align: center;
            padding: 6px 0 10px;
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .sheet {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }

            .sheet::before {
                height: 3px;
            }

            .sheet+.sheet {
                margin-top: 0;
                page-break-before: always;
            }

            .header {
                padding: 20px 28px 16px;
            }

            .table-section {
                padding: 14px 28px 20px;
            }

            .divider {
                margin: 0 28px;
            }

            .footer {
                padding: 12px 28px 16px;
            }

            .no-print {
                display: none !important;
            }
        }

        .print-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'Noto Sans TC', sans-serif;
            transition: opacity 0.15s;
        }

        .print-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    {{PAGES}}

    <button class="print-btn no-print" onclick="window.print()">
        <i class="fa-solid fa-print"></i> 列印簽到表
    </button>
</body>

</html>
